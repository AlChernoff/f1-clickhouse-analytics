f1_clickhouse_analytics:
  target: dev
  outputs:
    dev:
      type: clickhouse
      schema: default
      host: "{{ env_var('CLICKHOUSE_HOST', 'clickhouse') }}"
      port: "{{ env_var('CLICKHOUSE_HTTP_PORT', 8123) | int }}"
      user: "{{ env_var('CLICKHOUSE_USER', 'f1_app') }}"
      password: "{{ env_var('CLICKHOUSE_PASSWORD', 'f1_app_password') }}"
      secure: false
      verify: false
      connect_timeout: 10
      send_receive_timeout: 300
