apiVersion: 1

datasources:
  - name: ClickHouse
    type: grafana-clickhouse-datasource
    access: proxy
    uid: clickhouse
    isDefault: true
    editable: true
    jsonData:
      host: clickhouse
      port: 8123
      protocol: http
      username: f1_app
      defaultDatabase: monitoring
      tlsSkipVerify: true
    secureJsonData:
      password: f1_app_password
